<script>
// This single script contains all the client-side logic for the application.
// It's structured with objects to keep the code organized.

document.addEventListener('DOMContentLoaded', () => {
    // =================================================================
    //  APP CONFIGURATION & STATE
    // =================================================================
    const Config = {
        STATUS_ORDER: ["New", "In Progress", "On Hold", "Incomplete", "Completed"],
        USER_SELECTABLE_STATUSES: ["In Progress", "On Hold", "Incomplete", "Completed"],
        STATUS_STYLES: {
            "New": { bg: "bg-gray-200", text: "text-gray-800", border: "border-gray-400" },
            "In Progress": { bg: "bg-yellow-200", text: "text-yellow-800", border: "border-yellow-400" },
            "Wait for Review": { bg: "bg-indigo-200", text: "text-indigo-800", border: "border-indigo-400" },
            "Completed": { bg: "bg-green-200", text: "text-green-800", border: "border-green-400" },
            "On Hold": { bg: "bg-orange-200", text: "text-orange-800", border: "border-orange-400" },
            "Incomplete": { bg: "bg-red-200", text: "text-red-800", border: "border-red-400" },
        },
        DEFAULT_AVATAR: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2E1YjRjYyI+PHBhdGggZD0iTTAgMGgyNHYyNEgwVjB6IiBmaWxsPSJub25lIi8+PHBhdGggZD0iTTIwIDEyQzIwIDYuNDggMTUuNTIgMiAxMiAyUzQgNi40OCAyIDEyczQuNDggMTAgMTAgMTAgMTAtNC40OCAxMC0xMFptLTggMy45MWMtMS45OSAwLTMuNjEtMS40Ni0zLjkzLTMuMzQgMS43NC0uNjUgMy41OC0xIDUuNDItMXMzLjY4LjM1IDUuNDIgMWMtLjMyIDEuODgtMS45NCAzLjM0LTMuOTMgMy4zNHptMCAxLjQxYzIuNSAwIDQuNzItMS4wMiA2LjM2LTIuNjYtLjI5LTEuOTItMi40LTMuNDQtNS44Ni0zLjU0aC0uMDFjLS4zNCAwLS42Ny4wMi0xLjAxLjA1di4wMWMtMy40NS0uMS01LjU2LTEuNjMtNS44NS0zLjUzQzUuMjggMy44MiA3LjQ5IDIuOSAxMCAyLjljMi45MSAwIDUuNTIgMS4zMSA2LjM2IDIuNjZDNS4yOCAxOC4xOCA3LjUgMTkuMSAxMCAxOS4xeiIvPjw" + "/" + "c3ZnPg==",
    };
    const AppState = {
        admins: [], projects: [], currentUser: null, currentProject: null,
        unreadProjectIds: [], // This is now unused but kept for structure
        isMyTasksMode: false, countdownInterval: null,
        currentCalendarDate: new Date(),
    };
    
    // Directly initialize the DOMElements object.
    const DOMElements = {
        addProjectBtn: document.getElementById('addProjectBtn'),
        kanbanContainer: document.getElementById('kanban-container'),
        kanbanView: document.getElementById('kanban-view'),
        calendarView: document.getElementById('calendar-view'),
        detailView: document.getElementById('detail-view'),
        searchFilterContainer: document.getElementById('search-filter-container'),
        userFilterSelect: document.getElementById('user-filter-select'),
        searchInput: document.getElementById('search-input'),
        skeletonLoader: document.getElementById('skeleton-loader'),
        viewToggleButtons: document.getElementById('view-toggle-buttons'),
        kanbanViewBtn: document.getElementById('kanban-view-btn'),
        calendarViewBtn: document.getElementById('calendar-view-btn'),
    };

    const API = {
        run(functionName, ...args) {
            return new Promise((resolve, reject) => {
                google.script.run
                    .withSuccessHandler(resolve)
                    .withFailureHandler(reject)
                    .handleClientRequest(functionName, args);
            });
        }
    };

    const UI = {
        showView(viewName) {
            ['kanban', 'calendar', 'detail'].forEach(view => {
                const el = DOMElements[view + 'View'];
                if (el) el.classList.toggle('hidden', view !== viewName);
            });

            const isDetail = viewName === 'detail';
            DOMElements.addProjectBtn.classList.toggle('hidden', isDetail);
            DOMElements.searchFilterContainer.classList.toggle('hidden', isDetail || viewName === 'calendar');
            DOMElements.viewToggleButtons.classList.toggle('hidden', isDetail);

            DOMElements.kanbanViewBtn.classList.toggle('view-toggle-btn-active', viewName === 'kanban');
            DOMElements.calendarViewBtn.classList.toggle('view-toggle-btn-active', viewName === 'calendar');
            
            if (AppState.countdownInterval) clearInterval(AppState.countdownInterval);
        },
        showLoading(title = 'กำลังโหลด...') { Swal.fire({ title, allowOutsideClick: false, didOpen: () => Swal.showLoading() }); },
        showSuccess(title, text = '') { Swal.fire({ icon: 'success', title, text, showConfirmButton: false, timer: 1500 }); },
        showError(message) { Swal.fire('ผิดพลาด!', message, 'error'); },
        linkify(text) {
            if (!text) return '';
            const urlRegex = /((?:https?:\/\/|www\.)[^\s<]+)/g;
            return text.replace(urlRegex, url => `<a href="${url.startsWith('www.') ? 'http://' + url : url}" target="_blank" class="text-blue-600 hover:underline break-all">${url}</a>`);
        },
        readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve({ fileData: e.target.result.split(',')[1], fileName: file.name, mimeType: file.type });
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        },
        initializeMention(element) {
            if (!element) return;
            const tribute = new Tribute({
                trigger: '@',
                values: AppState.admins.map(admin => ({ key: admin.name, value: admin.name, email: admin.email, imageUrl: admin.imageUrl })),
                selectTemplate: (item) => `@${item.original.value}`,
                menuItemTemplate: (item) => `<img class="w-6 h-6 rounded-full mr-2 object-cover" src="${item.original.imageUrl || Config.DEFAULT_AVATAR}">${item.string}`,
                noMatchFound: 'ไม่พบผู้ใช้นี้'
            });
            tribute.attach(element);
        },
    };

    const Components = {
        createProjectCard(project) {
            const template = document.getElementById('project-card-template');
            const card = template.content.cloneNode(true).firstElementChild;
            card.dataset.projectId = project.projectId;
            card.dataset.status = project.status;
            
            const cardContent = card.querySelector('.cursor-pointer');
            cardContent.addEventListener('click', () => App.openDetailView(project.projectId));

            card.querySelector('.card-project-name').textContent = project.projectName;
            card.querySelector('.card-assignee-name').textContent = project.assignedTo || 'ยังไม่ระบุ';
            card.querySelector('.card-assignee-image').src = project.assignedToImage || Config.DEFAULT_AVATAR;
            card.querySelector('.card-timestamp').textContent = project.timestamp;

            if (project.projectDueDate && project.status !== 'Completed') {
                const today = new Date(); today.setHours(0, 0, 0, 0);
                const dueDate = new Date(project.projectDueDate);
                const diffDays = Math.ceil((dueDate - today) / 864e5);
                const badge = card.querySelector('.card-due-date-badge');
                if (diffDays < 0) badge.innerHTML = `<span class="text-xs font-semibold text-white bg-red-500 px-2 py-1 rounded-full ml-auto">ล่าช้า</span>`;
                else if (diffDays <= 7) badge.innerHTML = `<span class="text-xs font-semibold text-white bg-orange-500 px-2 py-1 rounded-full ml-auto">ใกล้ถึงกำหนด</span>`;
            }
            // Removed notification dot logic
            
            const deleteButton = card.querySelector('.delete-card-btn');
            deleteButton.addEventListener('click', (e) => {
                e.stopPropagation();
                Components.showDeleteProjectPopup(project.projectId, project.projectName);
            });

            return card;
        },
        async showAddProject() {
            let adminOptions = '<option value="" data-image="">-- ไม่ระบุ --</option>';
            AppState.admins.forEach(admin => adminOptions += `<option value="${admin.name}" data-image="${admin.imageUrl}">${admin.name}</option>`);
            const { value: result } = await Swal.fire({
                title: 'เพิ่มงานใหม่',
                html: `<form id="popupInspectionForm" class="text-left p-1 space-y-4">
                                <div class="bg-gray-50 p-3 rounded-lg border"><label class="block mb-1">ชื่องาน:</label><input type="text" id="swal-projectName" class="w-full p-2 border rounded-md" required></div>
                                <div class="bg-gray-50 p-3 rounded-lg border"><label class="block mb-1">กำหนดส่ง:</label><input type="date" id="swal-projectDueDate" class="w-full p-2 border rounded-md"></div>
                                <div class="bg-gray-50 p-3 rounded-lg border"><label class="block mb-1">รายละเอียด:</label><textarea id="swal-details" rows="2" class="w-full p-2 border rounded-md"></textarea></div>
                                <div class="bg-gray-50 p-3 rounded-lg border"><label class="block mb-1">แนบลิงก์ (ถ้ามี):</label><input type="url" id="swal-projectLink" class="w-full p-2 border rounded-md" placeholder="https://example.com"></div>
                                <div class="bg-gray-50 p-3 rounded-lg border"><label class="block mb-1">แนบไฟล์:</label><input type="file" id="swal-fileInput" class="w-full text-sm"></div>
                                <div class="bg-gray-50 p-3 rounded-lg border"><label class="block mb-1">มอบหมายให้:</label><select id="swal-assignedTo" class="w-full p-2 border rounded-md">${adminOptions}</select></div>
                               </form>`,
                showCancelButton: true, confirmButtonText: 'บันทึก', cancelButtonText: 'ยกเลิก', width: '40rem',
                preConfirm: () => {
                    const projectName = document.getElementById('swal-projectName').value;
                    if (!projectName) { Swal.showValidationMessage('กรุณากรอกชื่องาน'); return false; }
                    const assigneeSelect = document.getElementById('swal-assignedTo');
                    const selectedOption = assigneeSelect.options[assigneeSelect.selectedIndex];
                    return { 
                        projectName, 
                        details: document.getElementById('swal-details').value, 
                        assignedTo: selectedOption.value, 
                        assignedToImage: selectedOption.dataset.image, 
                        file: document.getElementById('swal-fileInput').files[0], 
                        projectDueDate: document.getElementById('swal-projectDueDate').value,
                        projectLink: document.getElementById('swal-projectLink').value
                    };
                }
            });
            if (result) {
                UI.showLoading('กำลังบันทึก...');
                const { file, ...submissionData } = result;
                try {
                    if (file) Object.assign(submissionData, await UI.readFileAsBase64(file));
                    const response = await API.run('saveData', submissionData);
                    if (response.status === 'success') { UI.showSuccess(response.message); await App.loadInitialData(); }
                    else UI.showError(response.message);
                } catch (err) { UI.showError(err.message); }
            }
        },
        async showEditProjectPopup() {
            const project = AppState.currentProject;
            if (!project) return;

            const { value: formValues } = await Swal.fire({
                title: 'แก้ไขรายละเอียดงาน',
                html:
                    `<div class="text-left space-y-4 p-2">` +
                    `    <div>` +
                    `        <label for="swal-edit-projectName" class="block mb-1 font-medium text-gray-700">ชื่องาน:</label>` +
                    `        <input id="swal-edit-projectName" class="w-full p-2 border rounded-md" value="${project.projectName}">` +
                    `    </div>` +
                    `    <div>` +
                    `        <label for="swal-edit-projectDueDate" class="block mb-1 font-medium text-gray-700">กำหนดส่ง:</label>` +
                    `        <input id="swal-edit-projectDueDate" type="date" class="w-full p-2 border rounded-md" value="${project.projectDueDate || ''}">` +
                    `    </div>` +
                    `</div>`,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                preConfirm: () => {
                    const newName = document.getElementById('swal-edit-projectName').value.trim();
                    if (!newName) {
                        Swal.showValidationMessage('กรุณากรอกชื่องาน');
                        return false;
                    }
                    return {
                        newName: newName,
                        newDueDate: document.getElementById('swal-edit-projectDueDate').value
                    };
                }
            });

            if (formValues) {
                UI.showLoading('กำลังบันทึกการเปลี่ยนแปลง...');
                try {
                    const response = await API.run('updateProjectCoreInfo', project.projectId, formValues.newName, formValues.newDueDate);
                    if (response.status === 'success') {
                        UI.showSuccess('บันทึกสำเร็จ');
                        App.refreshDetailView();
                    } else {
                        UI.showError(response.message);
                    }
                } catch (err) {
                    UI.showError(err.message);
                }
            }
        },
        async showEditInitialInfoPopup() {
            const project = AppState.currentProject;
            if (!project) return;

            const { value: formValues } = await Swal.fire({
                title: 'แก้ไขข้อมูลเริ่มต้น',
                html:
                    `<div class="text-left space-y-4 p-2">` +
                    `    <div>` +
                    `        <label for="swal-edit-details" class="block mb-1 font-medium text-gray-700">รายละเอียด:</label>` +
                    `        <textarea id="swal-edit-details" class="w-full p-2 border rounded-md" rows="3">${project.details || ''}</textarea>` +
                    `    </div>` +
                    `    <div>` +
                    `        <label for="swal-edit-projectLink" class="block mb-1 font-medium text-gray-700">ลิงก์:</label>` +
                    `        <input id="swal-edit-projectLink" type="url" class="w-full p-2 border rounded-md" value="${project.projectLinks.length > 0 ? project.projectLinks[0].url : ''}"` +
                    `    </div>` +
                    `</div>`,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                preConfirm: () => ({
                    newDetails: document.getElementById('swal-edit-details').value,
                    newLink: document.getElementById('swal-edit-projectLink').value
                })
            });

            if (formValues) {
                UI.showLoading('กำลังบันทึก...');
                try {
                    const response = await API.run('updateProjectInitialInfo', project.projectId, formValues.newDetails, formValues.newLink);
                    if (response.status === 'success') {
                        UI.showSuccess('บันทึกข้อมูลเริ่มต้นสำเร็จ');
                        App.refreshDetailView();
                    } else {
                        UI.showError(response.message);
                    }
                } catch (err) {
                    UI.showError(err.message);
                }
            }
        },
        async showDeleteProjectPopup(projectId, projectName) {
            const { isConfirmed } = await Swal.fire({
                title: 'ยืนยันการลบ',
                html: `คุณต้องการลบงาน "<b>${projectName}</b>" ใช่หรือไม่? การกระทำนี้ไม่สามารถย้อนกลับได้`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'ใช่, ลบเลย!',
                cancelButtonText: 'ยกเลิก'
            });

            if (isConfirmed) {
                UI.showLoading('กำลังลบงาน...');
                try {
                    const response = await API.run('deleteProject', projectId);
                    if (response.status === 'success') {
                        UI.showSuccess('ลบงานสำเร็จ');
                        App.loadInitialData();
                    } else {
                        UI.showError(response.message);
                    }
                } catch (err) {
                    UI.showError(err.message);
                }
            }
        },
        showProjectListByStatus(status) {
            const projectsInStatus = AppState.projects
                .filter(p => p.status === status)
                .sort((a, b) => new Date(b.rawTimestamp) - new Date(a.rawTimestamp));
            if (projectsInStatus.length === 0) {
                Swal.fire({ icon: 'info', title: 'ไม่มีงาน', text: `ไม่พบงานในสถานะ "${status}"` });
                return;
            }
            let projectListHtml = '<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-4 max-h-[70vh] overflow-y-auto p-2">';
            projectsInStatus.forEach(project => {
                projectListHtml += `
                    <div class="bg-white rounded-xl shadow p-4 flex flex-col justify-between cursor-pointer hover:shadow-lg hover:-translate-y-1 transition-all"
                         onclick="Swal.close(); App.openDetailView('${project.projectId}')">
                        <h4 class="text-base font-bold text-gray-800 mb-3 break-words leading-tight">${project.projectName}</h4>
                        <div class="mt-auto pt-3 border-t border-gray-100 space-y-2">
                            <div class="flex items-center">
                                <img src="${project.assignedToImage || Config.DEFAULT_AVATAR}" class="w-5 h-5 rounded-full mr-2 object-cover">
                                <p class="text-xs text-gray-600 truncate" title="${project.assignedTo || 'ยังไม่ระบุ'}">${project.assignedTo || 'ยังไม่ระบุ'}</p>
                            </div>
                            <div class="flex items-center text-gray-500">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                <p class="text-xs">${project.timestamp}</p>
                            </div>
                        </div>
                    </div>`;
            });
            projectListHtml += '</div>';
            Swal.fire({
                title: `<span class="text-2xl font-bold">รายการงานในสถานะ: ${status}</span>`,
                html: projectListHtml,
                width: '90vw',
                showConfirmButton: false,
                showCloseButton: true,
                background: '#f0f2f5'
            });
        },
        showChecklistDetail(index) {
            let currentItem = AppState.currentProject.detailsData.checklist[index];
            if (!currentItem) return;

            const generatePopupHtml = (item) => {
                const currentUser = AppState.currentUser;
                const isCurrentUserAssigned = item.assigneeEmail === currentUser.email;
                const projectAdmins = AppState.admins;

                const createFileHtml = (file) => {
                    if (!file || !file.url) return '';
                    return `<a href="${file.url}" target="_blank" class="flex items-center text-sm text-blue-600 hover:underline bg-blue-50 p-2 rounded-md mt-1"><svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg><span class="truncate">${file.name}</span></a>`;
                };
                const createLinkHtml = (link) => {
                    if (!link || !link.url) return '';
                    return `<a href="${link.url}" target="_blank" class="flex items-center text-sm text-purple-600 hover:underline bg-purple-50 p-2 rounded-md mt-1"><svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg><span class="truncate">${link.label || link.url}</span></a>`;
                };
                
                const createSystemLogHtml = (log) => {
                    const filesHtml = (log.files || []).map(createFileHtml).join('');
                    const linkHtml = log.link ? createLinkHtml(log.link) : '';
                     return `<div class="text-xs text-gray-600 border-b border-gray-200 py-2">
                                 <p>${UI.linkify(log.text)}</p>
                                 <div class="mt-1 space-y-1">${filesHtml}${linkHtml}</div>
                                 <p class="text-gray-400 text-right mt-1">- ${new Date(log.timestamp).toLocaleString('th-TH')}</p>
                                </div>`;
                };
                
                const createCommentHtml = (log) => {
                    const isFromCurrentUser = log.user === currentUser.email;
                    const alignmentClass = isFromCurrentUser ? 'justify-end' : 'justify-start';
                    const bubbleClass = isFromCurrentUser ? 'bg-blue-100' : 'bg-white';
                    const userHtml = `<span class="font-semibold text-gray-700">${log.user.split('@')[0]}</span>`;
                    const filesHtml = (log.files || []).map(createFileHtml).join('');
                    
                    return `<div class="flex ${alignmentClass} w-full">
                                 <div class="max-w-md">
                                     ${!isFromCurrentUser ? `<div class="text-xs font-semibold text-gray-600 mb-1">${userHtml}</div>` : ''}
                                     <div class="p-3 rounded-lg ${bubbleClass} shadow-sm border border-gray-200">
                                         <p class="text-gray-800 whitespace-pre-wrap text-sm">${UI.linkify(log.text)}</p>
                                         <div class="mt-2 space-y-1">${filesHtml}</div>
                                     </div>
                                     <div class="text-gray-400 text-xs mt-1 ${isFromCurrentUser ? 'text-right' : 'text-left'}">
                                         ${new Date(log.timestamp).toLocaleString('th-TH', { hour: '2-digit', minute: '2-digit' })}
                                     </div>
                                 </div>
                                </div>`;
                };
                
                const historyLogs = (item.history || []).filter(log => log.type !== 'comment');
                const commentLogs = (item.comments || []);
                const historyFeedHtml = historyLogs.length > 0 ? historyLogs.map(createSystemLogHtml).join('') : '<p class="text-gray-400 text-sm p-4 text-center">ไม่มีประวัติการทำงาน</p>';
                const conversationFeedHtml = commentLogs.length > 0 ? commentLogs.map(createCommentHtml).join('<div class="h-3"></div>') : '<p class="text-gray-400 text-sm p-4 text-center">ยังไม่มีการสนทนา</p>';

                let actionPanelHtml = '';
                if (isCurrentUserAssigned && item.status !== 'New' && item.status !== 'Complete') {
                    const selectable = Config.USER_SELECTABLE_STATUSES.filter(s => s !== 'In Progress' && s !== 'Completed');
                    const statusOptions = selectable.map(s => `<option value="${s}">${s}</option>`).join('');
                    const userOptions = projectAdmins.filter(a => a.email !== currentUser.email).map(a => `<option value="${a.name}">${a.name}</option>`).join('');
                    actionPanelHtml = `
                          <div class="border bg-slate-50 rounded-lg">
                               <div id="action-panel-toggle" class="flex justify-between items-center p-4 cursor-pointer">
                                   <h4 class="font-bold text-gray-800 text-lg">แผงควบคุมงาน</h4>
                                   <div class="flex items-center">
                                       <button id="swal-edit-task-btn" class="text-sm text-blue-600 hover:underline p-1 z-10">แก้ไข</button>
                                       <button id="swal-delete-task-btn" class="text-sm text-red-600 hover:underline p-1 z-10">ลบ</button>
                                       <svg id="action-panel-icon" class="w-6 h-6 ml-2 text-gray-600 transition-transform transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                   </div>
                               </div>
                               <div id="action-panel-content" class="p-4 border-t space-y-4 overflow-hidden transition-all duration-500 ease-in-out" style="max-height: 0px;">
                                   <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                       <div><label class="block text-sm font-medium text-gray-700">เปลี่ยนสถานะ</label><div class="flex items-center mt-1"><select id="swal-change-status-select" class="block w-full p-2 border border-gray-300 bg-white rounded-md shadow-sm sm:text-sm"><option value="">-- เลือกสถานะ --</option>${statusOptions}</select><button id="swal-change-status-btn" class="ml-2 bg-yellow-500 text-white p-2 rounded-md hover:bg-yellow-600 font-semibold h-10 flex-shrink-0">อัปเดต</button></div></div>

                                showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6',
                                confirmButtonText: 'ใช่, ลบเลย!', cancelButtonText: 'ยกเลิก'

    const KanbanBoard = {
        draggedItem: null,
        init() {
            const container = DOMElements.kanbanContainer;
            container.addEventListener('dragstart', this.handleDragStart.bind(this));
            container.addEventListener('dragover', this.handleDragOver.bind(this));
            container.addEventListener('dragleave', this.handleDragLeave.bind(this));
            container.addEventListener('drop', this.handleDrop.bind(this));
            container.addEventListener('dragend', this.handleDragEnd.bind(this));
            DOMElements.searchInput.addEventListener('input', this.applyFiltersAndSearch);
            DOMElements.userFilterSelect.addEventListener('change', this.applyFiltersAndSearch);
        },
        applyFiltersAndSearch() {
            const searchTerm = DOMElements.searchInput.value.toLowerCase();
            const selectedUser = DOMElements.userFilterSelect.value;
            let filteredProjects = AppState.projects;
            if (selectedUser !== 'all') filteredProjects = filteredProjects.filter(p => p.assignedTo === selectedUser);
            if (searchTerm) filteredProjects = filteredProjects.filter(p => p.projectName.toLowerCase().includes(searchTerm));
            KanbanBoard.render(filteredProjects);
        },
        render(projectsToRender) {
            DOMElements.skeletonLoader.classList.add('hidden');
            DOMElements.kanbanContainer.innerHTML = '';
            const groupedProjects = projectsToRender.reduce((acc, p) => { (acc[p.status] = acc[p.status] || []).push(p); return acc; }, {});
            const statusesToRender = Config.STATUS_ORDER.filter(status => status !== 'Wait for Review' || (groupedProjects[status] && groupedProjects[status].length > 0));
            statusesToRender.forEach(status => {
                const projectsInStatus = groupedProjects[status] || [];
                const style = Config.STATUS_STYLES[status] || Config.STATUS_STYLES["New"];
                const column = document.createElement('div');
                column.className = "flex-shrink-0 w-80 h-full";
                column.innerHTML = `<div class="bg-slate-100 rounded-xl h-full flex flex-col" data-status="${status}"><div class="flex justify-between items-center p-4 border-b-4 ${style.border}"><h2 class="text-lg font-bold ${style.text}">${status}</h2><span class="text-sm font-semibold ${style.bg} ${style.text} px-3 py-1 rounded-full">${projectsInStatus.length}</span></div><div class="cards-container p-2 space-y-3 overflow-y-auto flex-grow">${projectsInStatus.length === 0 ? '<div class="text-center p-10"><p class="text-gray-500 text-sm">ไม่มีรายการ</p></div>' : ''}</div></div>`;
                const cardsContainer = column.querySelector('.cards-container');
                projectsInStatus.sort((a,b) => new Date(b.rawTimestamp) - new Date(a.rawTimestamp)).forEach(p => cardsContainer.appendChild(Components.createProjectCard(p)));
                DOMElements.kanbanContainer.appendChild(column);
            });
        },
        async handleDrop(e) {
            e.preventDefault();
            const column = e.target.closest('[data-status]');
            if (column && this.draggedItem) {
                const projectId = e.dataTransfer.getData('text/plain'), oldStatus = e.dataTransfer.getData('text/x-old-status'), newStatus = column.dataset.status;
                column.classList.remove('drag-over');
                if (oldStatus !== newStatus) {
                    UI.showLoading('กำลังอัปเดตสถานะ...');
                    try {
                        const response = await API.run('updateProjectStatus', projectId, newStatus);
                        if (response.status === 'success') { UI.showSuccess('อัปเดตสถานะสำเร็จ'); await App.loadInitialData(); }
                        else { UI.showError(response.message); this.render(AppState.projects); }
                    } catch(err) { UI.showError(err.message); this.render(AppState.projects); }
                }
            }
        },
        handleDragStart(e) {
            const card = e.target.closest('[data-project-id][draggable="true"]');
            if (card) { this.draggedItem = card; e.dataTransfer.setData('text/plain', card.dataset.projectId); e.dataTransfer.setData('text/x-old-status', card.dataset.status); setTimeout(() => card.classList.add('opacity-50'), 0); }
        },
        handleDragOver(e) { const column = e.target.closest('[data-status]'); if (column && this.draggedItem) { e.preventDefault(); column.classList.add('drag-over'); } },
        handleDragLeave(e) { const column = e.target.closest('[data-status]'); if (column) column.classList.remove('drag-over'); },
        handleDragEnd() { document.querySelectorAll('.opacity-50').forEach(el => el.classList.remove('opacity-50')); document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); this.draggedItem = null; }
    };
    
    const CalendarView = {
        init() {},
        render() {
            const container = DOMElements.calendarView;
            container.innerHTML = '';

            const header = this.createHeader();
            const grid = this.createGrid();
            
            container.appendChild(header);
            container.appendChild(grid);
            
            this.addEventListeners();
        },
        createHeader() {
            const header = document.createElement('div');
            header.className = 'flex items-center justify-between mb-4';

            const monthYear = document.createElement('h2');
            monthYear.className = 'text-xl font-bold';
            monthYear.textContent = AppState.currentCalendarDate.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });

            const navButtons = document.createElement('div');
            navButtons.className = 'flex items-center space-x-2';
            navButtons.innerHTML = `
                <button id="prev-month-btn" class="p-2 rounded-full hover:bg-gray-100"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
                <button id="next-month-btn" class="p-2 rounded-full hover:bg-gray-100"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
            `;
            
            header.appendChild(monthYear);
            header.appendChild(navButtons);
            return header;
        },
        createGrid() {
            const grid = document.createElement('div');
            grid.className = 'calendar-grid';

            const daysOfWeek = ['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.'];
            daysOfWeek.forEach(day => {
                grid.innerHTML += `<div class="calendar-day-header">${day}</div>`;
            });

            const date = AppState.currentCalendarDate;
            const year = date.getFullYear();
            const month = date.getMonth();

            const firstDayOfMonth = new Date(year, month, 1);
            const lastDayOfMonth = new Date(year, month + 1, 0);
            const startDayOfWeek = firstDayOfMonth.getDay();
            
            for (let i = 0; i < startDayOfWeek; i++) {
                grid.innerHTML += `<div class="calendar-day calendar-day-other-month"></div>`;
            }

            for (let day = 1; day <= lastDayOfMonth.getDate(); day++) {
                const currentDate = new Date(year, month, day);
                const today = new Date();
                const isToday = currentDate.toDateString() === today.toDateString();
                const dayCell = document.createElement('div');
                dayCell.className = `calendar-day ${isToday ? 'calendar-day-today' : ''}`;
                dayCell.innerHTML = `<div class="calendar-day-number">${day}</div>`;
                
                this.renderTasksForDay(dayCell, currentDate);

                grid.appendChild(dayCell);
            }
            return grid;
        },
        renderTasksForDay(cell, date) {
            AppState.projects.forEach(project => {
                project.detailsData.checklist.forEach(item => {
                    if (!item.dueDate) return;
                    const dueDate = new Date(item.dueDate);
                    if (dueDate.toDateString() === date.toDateString()) {
                        const taskEl = document.createElement('div');
                        const style = Config.STATUS_STYLES[item.status] || Config.STATUS_STYLES['New'];
                        taskEl.className = `calendar-task ${style.bg}`;
                        taskEl.textContent = item.text;
                        taskEl.title = `${project.projectName}: ${item.text}`;
                        taskEl.addEventListener('click', () => App.openDetailView(project.projectId));
                        cell.appendChild(taskEl);
                    }
                });
            });
        },
        addEventListeners() {
            document.getElementById('prev-month-btn')?.addEventListener('click', () => {
                AppState.currentCalendarDate.setMonth(AppState.currentCalendarDate.getMonth() - 1);
                this.render();
            });
            document.getElementById('next-month-btn')?.addEventListener('click', () => {
                AppState.currentCalendarDate.setMonth(AppState.currentCalendarDate.getMonth() + 1);
                this.render();
            });
        }
    };

    const DetailView = {
        render(project) {
            AppState.currentProject = project;
            DOMElements.detailView.innerHTML = this.generateMainHTML(project);
            this.renderChecklist();
            this.renderLogs();
            this.renderActionButtons();
            this.startCountdown();
            this.addEventListeners();
        },
        generateMainHTML(project) {
            const dueDate = project.projectDueDate ? new Date(project.projectDueDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }) : 'ยังไม่ได้ระบุ';
            let adminOptions = '<option value="" data-image="" data-email="">-- มอบหมายให้ --</option>';
            AppState.admins.forEach(admin => adminOptions += `<option value="${admin.name}" data-image="${admin.imageUrl}" data-email="${admin.email}">${admin.name}</option>`);
            
            const initialInfoHTML = this.generateInitialInfoHTML(project);

            return `<div class="h-full flex flex-col p-4 sm:p-6"><div class="flex justify-between items-start mb-4 pb-4 border-b"><div><div class="flex items-center gap-x-3"><h2 id="detail-project-name" class="text-2xl lg:text-3xl font-bold text-gray-900">${project.projectName}</h2><button id="edit-project-btn" title="แก้ไขชื่องานและกำหนดส่ง" class="text-gray-400 hover:text-blue-600 p-1 rounded-full hover:bg-gray-100 transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.5L16.732 3.732z"></path></svg></button></div><p class="text-gray-500 mt-1 text-sm">ผู้รับผิดชอบ: ${project.assignedTo || 'N/A'}</p><p id="detail-due-date" class="text-gray-500 mt-1 text-sm">กำหนดส่ง: ${dueDate} | เวลาที่เหลือ: <span id="countdown-timer" class="font-semibold">-</span></p></div><button id="back-to-kanban-btn" class="bg-white hover:bg-gray-100 text-gray-800 font-semibold py-2 px-4 border border-gray-300 rounded-lg shadow-sm">กลับ</button></div><div id="action-bar" class="flex flex-wrap items-end gap-4 mb-6 p-4 bg-gray-100 rounded-xl"></div><div class="flex-grow grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-y-auto"><div class="lg:col-span-2 space-y-6">${initialInfoHTML}<div class="bg-white p-6 rounded-xl border"><h3 class="text-xl font-bold mb-4 text-gray-900">ขั้นตอนการทำงาน (Checklist)</h3><form id="add-checklist-form" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2 items-center p-3 bg-gray-50 rounded-md mb-4 border"><input type="text" id="checklist-input" class="lg:col-span-2 p-2 border rounded-md" placeholder="เพิ่มงานย่อยใหม่..."><input type="text" id="checklist-duedate" class="p-2 border rounded-md text-gray-500" placeholder="กำหนดส่ง (ถ้ามี)" onfocus="this.type='date'" onblur="if(!this.value) this.type='text'"><select id="checklist-assignee-select" class="p-2 border rounded-md">${adminOptions}</select><button type="submit" class="lg:col-span-4 w-full bg-slate-600 text-white px-4 py-2 rounded-md hover:bg-slate-700">เพิ่มงานย่อย</button></form><div id="checklist-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div></div><div class="lg:col-span-1 bg-white p-6 rounded-xl border h-full flex flex-col"><h3 class="text-xl font-bold mb-4 text-gray-900">ประวัติและคอมเมนต์</h3><div id="log-container" class="space-y-2 flex-grow overflow-y-auto pr-2"></div><div class="mt-4 pt-4 border-t border-gray-200"><textarea id="comment-input" rows="2" class="w-full flex-grow p-2 border rounded-md resize-none" placeholder="แสดงความคิดเห็น..."></textarea><div class="flex justify-end mt-2"><button id="add-comment-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">ส่ง</button></div></div></div></div></div>`;
        },
        generateInitialInfoHTML(project) {
            const creationLog = project.detailsData.logs.find(log => log.type === 'project_creation');
            const initialFiles = creationLog?.files || [];
            
            const filesHTML = initialFiles.map(file => 
                `<a href="${file.url}" target="_blank" class="flex items-center text-sm text-blue-600 hover:underline bg-blue-50 p-2 rounded-md mt-1">
                    <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                    <span class="truncate">${file.name}</span>
                </a>`
            ).join('');

            const linksHTML = project.projectLinks.map(link =>
                `<a href="${link.url}" target="_blank" class="flex items-center text-sm text-purple-600 hover:underline bg-purple-50 p-2 rounded-md mt-1">
                    <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    <span class="truncate">${link.label || link.url}</span>
                </a>`
            ).join('');

            return `<div class="bg-white p-6 rounded-xl border">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xl font-bold text-gray-900">รายละเอียดเริ่มต้น</h3>
                            <button id="edit-initial-info-btn" title="แก้ไขข้อมูลเริ่มต้น" class="text-gray-400 hover:text-blue-600 p-1 rounded-full hover:bg-gray-100 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.5L16.732 3.732z"></path></svg>
                            </button>
                        </div>
                        <p class="text-gray-700 whitespace-pre-wrap">${project.details || 'ไม่มีรายละเอียด'}</p>
                        <div class="mt-3 space-y-1">${linksHTML}${filesHTML}</div>
                    </div>`;
        },
        renderChecklist() {
            const container = document.getElementById('checklist-container');
            if (!container) return;
            const checklist = AppState.currentProject.detailsData.checklist || [];
            container.innerHTML = checklist.length === 0 ? '<p class="text-gray-500 md:col-span-2">ยังไม่มีงานย่อย</p>' : '';
            if (checklist.length > 0) {
                checklist.forEach((item, index) => {
                    const template = document.getElementById('checklist-item-template');
                    const card = template.content.cloneNode(true).firstElementChild;
                    const statusStyle = Config.STATUS_STYLES[item.status || 'New'] || {bg: "bg-gray-200", text: "text-gray-800"};
                    card.dataset.index = index;
                    card.querySelector('.item-text').textContent = item.text;
                    const statusSpan = card.querySelector('.item-status');
                    statusSpan.textContent = item.status || 'New';
                    statusSpan.className = 'item-status text-xs font-semibold py-1 px-2 rounded-full cursor-pointer ' + statusStyle.bg + ' ' + statusStyle.text;
                    card.querySelector('.item-assignee-image').src = item.assigneeImage || Config.DEFAULT_AVATAR;
                    card.querySelector('.item-assignee-name').textContent = item.assignee || 'N/A';
                    container.appendChild(card);
                });
            }
        },
        renderLogs() {
            const container = document.getElementById('log-container');
            if (!container) return;
            const logs = AppState.currentProject.detailsData.logs || [];
            container.innerHTML = logs.length === 0 ? '<p class="text-gray-500">ยังไม่มีประวัติ</p>' : '';
            if(logs.length > 0) {
                [...logs].reverse().forEach(log => {
                    const template = document.getElementById('log-entry-template');
                    const entry = template.content.cloneNode(true).firstElementChild;
                    entry.querySelector('.log-text').innerHTML = UI.linkify(log.display_text || log.text);
                    entry.querySelector('.log-meta').textContent = `โดย ${log.user.split('@')[0]} - ${new Date(log.timestamp).toLocaleString('th-TH')}`;
                    container.appendChild(entry);
                    container.appendChild(document.createElement('hr'));
                });
            }
        },
        renderActionButtons() {
            const container = document.getElementById('action-bar');
            if (!container) return;
            const project = AppState.currentProject, user = AppState.currentUser;
            const isAssignee = project.assignedTo === user.name;
            const isTeamProject = project.assignedTo === 'Team' || project.assignedTo === 'bot';
            const canTakeAction = isAssignee || isTeamProject;

            if (canTakeAction && project.status !== 'Completed') {
                const statusOptions = Config.USER_SELECTABLE_STATUSES
                    .map(s => `<option value="${s}" ${s === project.status ? 'selected' : ''}>${s}</option>`)
                    .join('');

                container.innerHTML = `
                    <div>
                        <label class="text-sm font-medium text-gray-600">เปลี่ยนสถานะงาน:</label>
                        <select id="detail-status-select" class="w-full mt-1 bg-white border border-gray-300 text-gray-700 py-2 px-4 pr-8 rounded-lg">
                            ${statusOptions}
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button id="updateStatusBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg h-10 font-bold hover:bg-blue-700">
                            อัปเดตสถานะ
                        </button>
                    </div>`;
            } else {
                container.innerHTML = `<p class="text-gray-700">สถานะปัจจุบัน: <strong>${project.status}</strong></p>`;
            }
        },
        startCountdown() {
            if (AppState.countdownInterval) clearInterval(AppState.countdownInterval);
            const timerElement = document.getElementById('countdown-timer');
            if (!timerElement || !AppState.currentProject.projectDueDate) { if(timerElement) timerElement.textContent = '-'; return; }
            const update = () => {
                const now = new Date(); now.setHours(0,0,0,0);
                const dueDate = new Date(AppState.currentProject.projectDueDate);
                const diffDays = Math.ceil((dueDate - now) / 864e5);
                timerElement.classList.remove('text-red-500', 'text-green-600', 'text-yellow-600');
                if (diffDays < 0) { timerElement.textContent = `เลยกำหนด ${Math.abs(diffDays)} วัน`; timerElement.classList.add('text-red-500'); }
                else if (diffDays === 0) { timerElement.textContent = 'วันนี้'; timerElement.classList.add('text-yellow-600'); }
                else { timerElement.textContent = `${diffDays + 1} วัน`; timerElement.classList.add('text-green-600'); }
            };
            update(); AppState.countdownInterval = setInterval(update, 1000 * 60 * 60);
        },
        addEventListeners() {
            document.getElementById('back-to-kanban-btn')?.addEventListener('click', App.goBackToKanban);
            document.getElementById('edit-project-btn')?.addEventListener('click', Components.showEditProjectPopup);
            document.getElementById('edit-initial-info-btn')?.addEventListener('click', Components.showEditInitialInfoPopup);
            document.getElementById('add-checklist-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const input = document.getElementById('checklist-input'), assigneeSelect = document.getElementById('checklist-assignee-select'), dueDateInput = document.getElementById('checklist-duedate'), text = input.value.trim();
                if (!text) return;
                UI.showLoading('กำลังเพิ่มงานย่อย...');
                const selectedOption = assigneeSelect.options[assigneeSelect.selectedIndex];
                const newChecklistItem = { text, status: 'New', history: [], comments: [], assignee: selectedOption.value, assigneeImage: selectedOption.dataset.image, assigneeEmail: selectedOption.dataset.email, dueDate: dueDateInput.value };
                const newDetailsData = AppState.currentProject.detailsData;
                newDetailsData.checklist.push(newChecklistItem);
                try {
                    const response = await API.run('updateProjectDetails', AppState.currentProject.projectId, newDetailsData);
                    if (response.status === 'success') { UI.showSuccess('เพิ่มงานย่อยสำเร็จ'); App.refreshDetailView(); } else UI.showError(response.message);
                } catch (err) { UI.showError(err.message); }
            });
            document.getElementById('add-comment-btn')?.addEventListener('click', async () => {
                const input = document.getElementById('comment-input'), text = input.value.trim();
                if(!text) return;
                UI.showLoading('กำลังส่งคอมเมนต์...');
                try {
                    const mentionedNames = (text.match(/@(\w+)/g) || []).map(name => name.substring(1));
                    const mentionedEmails = mentionedNames.map(name => getEmailByUserName(name)).filter(Boolean);
                    const response = await API.run('addLog', AppState.currentProject.projectId, { 
                        commentText: text, 
                        type: 'comment',
                        mentionedEmails: mentionedEmails
                    });
                    if (response.status === 'success') App.refreshDetailView(); 
                    else UI.showError(response.message);
                } catch (err) { 
                    UI.showError(err.message); 
                }
            });
            
            UI.initializeMention(document.getElementById('comment-input'));

            document.getElementById('updateStatusBtn')?.addEventListener('click', async () => {
                const newStatus = document.getElementById('detail-status-select').value;
                if(newStatus === AppState.currentProject.status) return;
                UI.showLoading('กำลังอัปเดตสถานะ...');
                try {
                    const response = await API.run('updateProjectStatus', AppState.currentProject.projectId, newStatus);
                    if (response.status === 'success') App.refreshDetailView(); else UI.showError(response.message);
                } catch(err) { UI.showError(err.message); }
            });

            document.getElementById('checklist-container')?.addEventListener('click', (e) => {
                const card = e.target.closest('.checklist-item');
                if (card && card.dataset.index) {
                    Components.showChecklistDetail(parseInt(card.dataset.index));
                }
            });
        },
    };

    const App = {
        init() {
            // This function is no longer needed as DOMElements is initialized directly.
            
            if ('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(new Blob([`self.addEventListener('fetch', () => {});`], {type: 'application/javascript'})));
            DOMElements.addProjectBtn.addEventListener('click', () => Components.showAddProject());
            
            DOMElements.kanbanViewBtn.addEventListener('click', () => {
                UI.showView('kanban');
            });
            DOMElements.calendarViewBtn.addEventListener('click', () => {
                UI.showView('calendar');
                CalendarView.render();
            });

            KanbanBoard.init();
            CalendarView.init();
            this.loadInitialData(window.urlParams ? window.urlParams.projectId : null);
        },
        async loadInitialData(projectIdToOpen = null) {
            if (!Swal.isVisible()) UI.showLoading('กำลังโหลดข้อมูล...');
            try {
                const data = await API.run('getInitialData');
                AppState.projects = data.projects.status === 'success' ? data.projects.data : [];
                AppState.admins = data.admins.status === 'success' ? data.admins.data : [];
                AppState.unreadProjectIds = []; // Always empty now
                const adminData = AppState.admins.find(a => a.email === data.currentUser.email);
                AppState.currentUser = { ...data.currentUser, imageUrl: adminData?.imageUrl || Config.DEFAULT_AVATAR };
                this.populateUserFilter();
                if (projectIdToOpen) {
                    this.openDetailView(projectIdToOpen);
                } else {
                    const currentView = DOMElements.calendarView.classList.contains('hidden') ? 'kanban' : 'calendar';
                    UI.showView(currentView);
                    if (currentView === 'kanban') {
                        KanbanBoard.applyFiltersAndSearch();
                    } else {
                        CalendarView.render();
                    }
                }
                Swal.close();
            } catch (error) { UI.showError(error.message); }
        },
        populateUserFilter() {
            DOMElements.userFilterSelect.innerHTML = '<option value="all">แสดงทั้งหมด</option>';
            AppState.admins.forEach(admin => {
                const option = document.createElement('option');
                option.value = admin.name; option.textContent = admin.name;
                DOMElements.userFilterSelect.appendChild(option);
            });
            DOMElements.searchFilterContainer.classList.remove('hidden');
        },
        async openDetailView(projectId) {
            UI.showView('detail');
            UI.showLoading('กำลังโหลดโปรเจกต์...');
            try {
                let project = AppState.projects.find(p => p.projectId === projectId);
                if (!project) {
                    const response = await API.run('getProjectById', projectId);
                    if (response.status !== 'success') throw new Error(response.message);
                    project = response.data;
                }
                DetailView.render(project);
                Swal.close();
                // Removed mark as read logic
            } catch(err) { UI.showError(err.message); this.goBackToKanban(); }
        },
        goBackToKanban() {
            UI.showView('kanban');
            KanbanBoard.applyFiltersAndSearch();
            window.history.pushState({}, document.title, window.location.pathname);
        },
        async refreshDetailView() {
            if (!AppState.currentProject) return;
            UI.showLoading('กำลังรีเฟรช...');
            try {
                const projectId = AppState.currentProject.projectId;
                const response = await API.run('getProjectById', projectId);
                if (response.status === 'success') {
                    const projectIndex = AppState.projects.findIndex(p => p.projectId === projectId);
                    if (projectIndex !== -1) AppState.projects[projectIndex] = response.data;
                    DetailView.render(response.data);
                    Swal.close();
                } else {
                    UI.showError(response.message);
                }
            } catch (err) {
                UI.showError(err.message);
            }
        },
    };

    function getEmailByUserName(name) {
        if (!name) return null;
        const admin = AppState.admins.find(a => a.name === name.trim());
        return admin ? admin.email : null;
    }

    // --- APP INITIALIZATION ---
    App.init();
});
</script>
