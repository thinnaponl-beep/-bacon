<script>
document.addEventListener('DOMContentLoaded', () => {
    // =================================================================

    const Config = {
        STATUS_ORDER: ["New", "In Progress", "Change Request", "On Hold", "Incomplete", "Completed"],
        USER_SELECTABLE_STATUSES: ["In Progress", "Change Request", "On Hold", "Incomplete", "Completed"],
        STATUS_STYLES: {

            "Wait for Review": { bg: "bg-indigo-50", text: "text-indigo-700", border: "border-indigo-400", badge: "bg-indigo-100 text-indigo-700" },

    };
    
    const AppState = {
        admins: [], projects: [], currentUser: null, currentProject: null,
        isMyTasksMode: false, countdownInterval: null,
        currentCalendarDate: new Date(),
    };
    
    const DOMElements = {
        addProjectBtn: document.getElementById('addProjectBtn'),
        settingsBtn: document.getElementById('settingsBtn'),
        kanbanContainer: document.getElementById('kanban-container'),
        kanbanView: document.getElementById('kanban-view'),
        calendarView: document.getElementById('calendar-view'),
        ganttView: document.getElementById('gantt-view'),
        detailView: document.getElementById('detail-view'),
        searchFilterContainer: document.getElementById('search-filter-container'),
        userFilterSelect: document.getElementById('user-filter-select'),
        searchInput: document.getElementById('search-input'),
        skeletonLoader: document.getElementById('skeleton-loader'),
        viewToggleButtons: document.getElementById('view-toggle-buttons'),
        kanbanViewBtn: document.getElementById('kanban-view-btn'),
        calendarViewBtn: document.getElementById('calendar-view-btn'),
        ganttViewBtn: document.getElementById('gantt-view-btn'),
    };

    const API = {
        run(functionName, ...args) {
            return new Promise((resolve, reject) => {
                google.script.run
                    .withSuccessHandler(resolve)
                    .withFailureHandler(reject)
                    .handleClientRequest(functionName, args);
            });
        }
    };

    const UI = {
        showView(viewName) {
            ['kanban', 'calendar', 'gantt', 'detail'].forEach(view => {
                const el = DOMElements[view + 'View'];
                if (el) el.classList.toggle('hidden', view !== viewName);
            });

            const isDetail = viewName === 'detail';
            DOMElements.addProjectBtn.classList.toggle('hidden', isDetail);
            DOMElements.settingsBtn.classList.toggle('hidden', isDetail);
            DOMElements.searchFilterContainer.classList.toggle('hidden', isDetail || viewName === 'calendar' || viewName === 'gantt');
            DOMElements.viewToggleButtons.classList.toggle('hidden', isDetail);

            DOMElements.kanbanViewBtn.classList.toggle('view-toggle-btn-active', viewName === 'kanban');
            DOMElements.calendarViewBtn.classList.toggle('view-toggle-btn-active', viewName === 'calendar');
            DOMElements.ganttViewBtn.classList.toggle('view-toggle-btn-active', viewName === 'gantt');
            
            if (AppState.countdownInterval) clearInterval(AppState.countdownInterval);
        },
        showLoading(title = 'กำลังโหลด...') { Swal.fire({ title, allowOutsideClick: false, didOpen: () => Swal.showLoading() }); },
        showSuccess(title, text = '') { Swal.fire({ icon: 'success', title, text, showConfirmButton: false, timer: 1500 }); },
        showError(message) { Swal.fire('ผิดพลาด!', message, 'error'); },
        linkify(text) {
            if (!text) return '';
            const urlRegex = /((?:https?:\/\/|www\.)[^\s<]+)/g;
            return text.replace(urlRegex, url => `<a href="${url.startsWith('www.') ? 'http://' + url : url}" target="_blank" class="text-indigo-600 hover:underline break-all">${url}</a>`);
        },
        readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve({ fileData: e.target.result.split(',')[1], fileName: file.name, mimeType: file.type });
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        },
        initializeMention(element) {
            if (!element) return;
            const tribute = new Tribute({
                trigger: '@',
                values: AppState.admins.map(admin => ({ key: admin.name, value: admin.name, email: admin.email, imageUrl: admin.imageUrl })),
                selectTemplate: (item) => `@${item.original.value}`,
                menuItemTemplate: (item) => `<img class="w-6 h-6 rounded-full mr-2 object-cover" src="${item.original.imageUrl || Config.DEFAULT_AVATAR}">${item.string}`,
                noMatchFound: 'ไม่พบผู้ใช้นี้'
            });
            tribute.attach(element);
        },
        getUserColorClass(emailStr) {
            const colors = ['bg-red-400', 'bg-blue-400', 'bg-green-400', 'bg-yellow-400', 'bg-purple-400', 'bg-pink-400', 'bg-indigo-400', 'bg-teal-400', 'bg-orange-400', 'bg-cyan-400'];
            let hash = 0;
            if(!emailStr) return 'bg-gray-400';
            for (let i = 0; i < emailStr.length; i++) hash = emailStr.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }
    };

    // =================================================================
    //  PERSONAL TO-DO LIST MODULE
    // =================================================================
    const PersonalTodo = {
        currentTab: 'active',
        searchQuery: '',
        isExpanded: false,
        init() {
            this.container = document.getElementById('todo-items-container');
            this.form = document.getElementById('add-todo-form');
            this.input = document.getElementById('todo-input-text');
            this.dateInput = document.getElementById('todo-input-date');
            this.sidebar = document.getElementById('todo-sidebar');
            this.overlay = document.getElementById('todo-overlay');
            this.notificationDot = document.getElementById('todo-notification-dot');
            
            this.expandBtn = document.getElementById('expand-todo-btn');
            this.searchInput = document.getElementById('todo-search-input');
            this.tabActive = document.getElementById('todo-tab-active');
            this.tabCompleted = document.getElementById('todo-tab-completed');
            
            const toggleSidebar = () => {
                const isClosed = this.sidebar.classList.contains('translate-x-full');
                if (isClosed) {
                    this.sidebar.classList.remove('translate-x-full');
                    this.overlay.classList.remove('hidden');
                } else {
                    this.sidebar.classList.add('translate-x-full');
                    this.overlay.classList.add('hidden');
                }
            };

            document.getElementById('toggle-todo-btn').addEventListener('click', toggleSidebar);
            document.getElementById('close-todo-btn').addEventListener('click', toggleSidebar);
            this.overlay.addEventListener('click', toggleSidebar);

            this.expandBtn.addEventListener('click', () => {
                this.isExpanded = !this.isExpanded;
                if (this.isExpanded) {
                    this.sidebar.classList.remove('sm:w-96');
                    this.sidebar.classList.add('sm:w-[500px]', 'md:w-[600px]');
                    this.expandBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>`;
                } else {
                    this.sidebar.classList.remove('sm:w-[500px]', 'md:w-[600px]');
                    this.sidebar.classList.add('sm:w-96');
                    this.expandBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>`;
                }
            });

            this.searchInput.addEventListener('input', (e) => {
                this.searchQuery = e.target.value.toLowerCase();
                this.loadTodos();
            });

            this.tabActive.addEventListener('click', () => {
                this.currentTab = 'active';
                this.updateTabUI();
                this.loadTodos();
            });
            
            this.tabCompleted.addEventListener('click', () => {
                this.currentTab = 'completed';
                this.updateTabUI();
                this.loadTodos();
            });

            this.form.addEventListener('submit', (e) => {
                e.preventDefault();
                this.addTodo(this.input.value, this.dateInput ? this.dateInput.value : null);
                this.input.value = '';
                if (this.dateInput) this.dateInput.value = '';
            });

            setInterval(() => this.checkReminders(), 60000);

            window.PersonalTodo = this;
            this.updateTabUI();
            this.loadTodos();
            this.checkReminders();
        },
        updateTabUI() {
            if (this.currentTab === 'active') {
                this.tabActive.className = 'flex-1 py-1.5 text-sm font-semibold rounded-lg bg-white shadow-sm text-indigo-600 transition-all';
                this.tabCompleted.className = 'flex-1 py-1.5 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-200/50 transition-all';
            } else {
                this.tabCompleted.className = 'flex-1 py-1.5 text-sm font-semibold rounded-lg bg-white shadow-sm text-indigo-600 transition-all';
                this.tabActive.className = 'flex-1 py-1.5 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-200/50 transition-all';
            }
        },
        checkReminders() {
            const todos = JSON.parse(localStorage.getItem('sqm_personal_todos') || '[]');
            const now = new Date();
            let hasDueTasks = false;
            let needsRender = false;
            
            todos.forEach(todo => {
                if (!todo.completed && todo.dueDate) {
                    const dueDate = new Date(todo.dueDate);
                    if (now >= dueDate) {
                        hasDueTasks = true;
                        if (!todo.notified) {
                            todo.notified = true;
                            needsRender = true;
                        }
                    }
                }
            });
            
            if (needsRender) {
                this.saveTodos(todos); 
            }
            
            if (this.notificationDot) {
                if (hasDueTasks) {
                    this.notificationDot.classList.remove('hidden');
                } else {
                    this.notificationDot.classList.add('hidden');
                }
            }
        },
        loadTodos() {
            let todos = JSON.parse(localStorage.getItem('sqm_personal_todos') || '[]');
            this.container.innerHTML = '';
            
            if (this.searchQuery) {
                todos = todos.filter(t => t.text.toLowerCase().includes(this.searchQuery));
            }

            if (this.currentTab === 'active') {
                todos = todos.filter(t => !t.completed);
            } else {
                todos = todos.filter(t => t.completed);
            }

            if (todos.length === 0) {
                this.container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-40 text-center text-gray-400 mt-6">
                        <svg class="w-12 h-12 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        <p class="text-sm">ไม่พบรายการ</p>
                    </div>`;
            } else {
                todos.sort((a,b) => {
                    if(a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
                    if(a.dueDate) return -1;
                    if(b.dueDate) return 1;
                    return b.id - a.id; 
                }).forEach((todo) => this.renderTodo(todo));
            }
        },
        saveTodos(todos) {
            localStorage.setItem('sqm_personal_todos', JSON.stringify(todos));
            this.loadTodos();
            this.checkReminders();
        },
        addTodo(text, dueDate = null) {
            if (!text.trim()) return;
            const todos = JSON.parse(localStorage.getItem('sqm_personal_todos') || '[]');
            todos.push({ text: text, dueDate: dueDate, completed: false, notified: false, id: Date.now() });
            
            this.currentTab = 'active';
            this.updateTabUI();
            this.saveTodos(todos);
        },
        toggleTodo(id) {
            const todos = JSON.parse(localStorage.getItem('sqm_personal_todos') || '[]');
            const index = todos.findIndex(t => t.id === id);
            if (index > -1) {
                todos[index].completed = !todos[index].completed;
                if(todos[index].completed) todos[index].notified = false; 
                this.saveTodos(todos);
            }
        },
        deleteTodo(id) {
            let todos = JSON.parse(localStorage.getItem('sqm_personal_todos') || '[]');
            todos = todos.filter(t => t.id !== id);
            this.saveTodos(todos);
        },
        renderTodo(todo) {
            const div = document.createElement('div');
            let dueDateHtml = '';
            let isOverdue = false;
            
            if (todo.dueDate) {
                const dueDate = new Date(todo.dueDate);
                const now = new Date();
                isOverdue = !todo.completed && now >= dueDate;
                
                const formattedDate = dueDate.toLocaleString('th-TH', { 
                    day: 'numeric', month: 'short', 
                    hour: '2-digit', minute: '2-digit' 
                });
                
                dueDateHtml = `<div class="mt-1 flex items-center text-[11px] font-semibold ${isOverdue ? 'text-red-500 animate-pulse' : 'text-indigo-400'}">
                    <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    ${formattedDate} ${isOverdue ? '(ถึงกำหนด)' : ''}
                </div>`;
            }

            div.className = `flex items-start justify-between p-3.5 rounded-xl border transition-all ${todo.completed ? 'bg-gray-100/50 border-gray-100 opacity-60' : (isOverdue ? 'bg-red-50 border-red-200 shadow-sm' : 'bg-white border-gray-200 shadow-sm hover:shadow')}`;
            div.innerHTML = `
                <div class="flex items-start cursor-pointer flex-grow pr-3" onclick="PersonalTodo.toggleTodo(${todo.id})">
                    <input type="checkbox" ${todo.completed ? 'checked' : ''} class="mt-1.5 w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer flex-shrink-0 transition-colors">
                    <div class="flex flex-col ml-3">
                        <span class="text-sm font-medium ${todo.completed ? 'line-through text-gray-400' : 'text-gray-700'} leading-snug">${todo.text}</span>
                        ${dueDateHtml}
                    </div>
                </div>
                <button onclick="PersonalTodo.deleteTodo(${todo.id}); event.stopPropagation();" class="text-gray-300 hover:text-red-500 transition-colors p-1 flex-shrink-0 mt-0.5" title="ลบงานนี้">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            `;
            this.container.appendChild(div);
        }
    };

    // =================================================================
    //  GANTT CHART MODULE
    // =================================================================
    const GanttView = {
        chart: null,
        render() {
            const container = document.getElementById('gantt-chart-container');
            container.innerHTML = '';
            
            const tasks = AppState.projects.map(p => {
                const start = new Date(p.rawTimestamp).toISOString().split('T')[0];
                let end = p.projectDueDate ? new Date(p.projectDueDate).toISOString().split('T')[0] : '';
                
                if(!end) {
                    const d = new Date(p.rawTimestamp);
                    d.setDate(d.getDate() + 7);
                    end = d.toISOString().split('T')[0];
                }

                let progress = 0;
                const checklist = p.detailsData?.checklist || [];
                if (checklist.length > 0) {
                    const completed = checklist.filter(item => item.status === 'Completed' || item.status === 'Complete').length;
                    progress = Math.round((completed / checklist.length) * 100);
                } else if (p.status === 'Completed') {
                    progress = 100;
                }

                return {
                    id: p.projectId,
                    name: p.projectName,
                    start: start,
                    end: end,
                    progress: progress,
                    custom_class: p.status === 'Completed' ? 'gantt-completed' : 'gantt-active'
                };
            });

            if (tasks.length === 0) {
                container.innerHTML = '<div class="text-center p-10 mt-10 text-gray-500 font-medium">ยังไม่มีงานสำหรับแสดงไทม์ไลน์</div>';
                return;
            }

            this.chart = new Gantt("#gantt-chart-container", tasks, {
                view_mode: 'Week',
                language: 'en',
                bar_height: 30,
                padding: 18,
                on_click: (task) => {
                    App.openDetailView(task.id);
                },
                on_date_change: async (task, start, end) => {
                    const startDateStr = new Date(start.getTime() - (start.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                    const endDateStr = new Date(end.getTime() - (end.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                    
                    UI.showLoading('กำลังบันทึกวันที่...');
                    try {
                        const response = await API.run('updateProjectDates', task.id, startDateStr, endDateStr);
                        if (response.status === 'success') {
                            UI.showSuccess('บันทึกสำเร็จ');
                            App.loadInitialData(); 
                        } else {
                            UI.showError(response.message);
                            GanttView.render(); 
                        }
                    } catch (err) {
                        UI.showError(err.message);
                        GanttView.render(); 
                    }
                }
            });

            document.querySelectorAll('.gantt-zoom-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if(this.chart) {
                        this.chart.change_view_mode(e.target.dataset.view);
                    }
                });
            });
        }
    };

    // =================================================================
    //  COMPONENTS MODULE 
    // =================================================================
    const Components = {
        createProjectCard(project) {
            const template = document.getElementById('project-card-template');
            const card = template.content.cloneNode(true).firstElementChild;
            card.dataset.projectId = project.projectId;
            card.dataset.status = project.status;
            
            const cardStyle = Config.STATUS_STYLES[project.status] || Config.STATUS_STYLES["New"];
            
            const badge = card.querySelector('.card-status-badge');
            badge.textContent = project.status;
            badge.className = `card-status-badge text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wide mb-2 inline-block ${cardStyle.badge}`;

            card.querySelector('.card-project-name').textContent = project.projectName;
            card.querySelector('.card-assignee-name').textContent = project.assignedTo || 'Unassigned';
            card.querySelector('.card-assignee-image').src = project.assignedToImage || Config.DEFAULT_AVATAR;
            
            let dueDateText = 'ไม่ระบุ';
            let dueDateClass = 'text-gray-500';
            let borderClass = 'border-gray-100'; 

            if (project.projectDueDate) {
                const dueDateObj = new Date(project.projectDueDate);
                const now = new Date();
                
                const compareDate = new Date(dueDateObj);
                compareDate.setHours(0,0,0,0);
                now.setHours(0,0,0,0);
                
                const diffDays = Math.ceil((compareDate - now) / (1000 * 60 * 60 * 24));
                dueDateText = dueDateObj.toLocaleDateString('th-TH', { month:'short', day:'numeric'});

                if (project.status !== 'Completed') {
                    if (diffDays < 0) {
                        dueDateClass = 'text-red-600 font-bold';
                        dueDateText += ' (เลยกำหนด)';
                        borderClass = 'border-pulse-red'; 
                    } else if (diffDays <= 1) {
                        dueDateClass = 'text-orange-500 font-bold';
                        dueDateText += ` (พรุ่งนี้/วันนี้)`;
                        borderClass = 'border-pulse-orange'; 
                    } else if (diffDays <= 3) {
                        dueDateClass = 'text-yellow-600 font-bold';
                        dueDateText += ` (เหลือ ${diffDays} วัน)`;
                        borderClass = 'border-pulse-yellow'; 
                    }
                }
            }
            
            card.className = `project-card card-hover relative bg-white rounded-2xl p-4 border shadow-sm group cursor-pointer ${borderClass}`;

            const dueDateEl = card.querySelector('.card-due-date-text');
            dueDateEl.textContent = dueDateText;
            dueDateEl.className = `card-due-date-text text-[11px] ${dueDateClass}`;

            const creationLog = project.detailsData?.logs?.find(log => log.type === 'project_creation');
            const creatorEmail = creationLog ? creationLog.user : 'ไม่ระบุอีเมล';
            const createdDate = new Date(project.rawTimestamp);
            const createdStr = createdDate.toLocaleString('th-TH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            
            const creatorEl = card.querySelector('.card-creator-text');
            if (creatorEl) creatorEl.textContent = `${creatorEmail} • ${createdStr}`;

            let progress = 0;
            const checklist = project.detailsData?.checklist || [];
            if (checklist.length > 0) {
                const completed = checklist.filter(item => item.status === 'Completed' || item.status === 'Complete').length;
                progress = Math.round((completed / checklist.length) * 100);
            } else if (project.status === 'Completed') {
                progress = 100;
            }
            card.querySelector('.card-progress-bar').style.width = `${progress}%`;
            card.querySelector('.card-progress-text').textContent = `${progress}%`;
            
            // เพิ่มไอคอนแจ้งเตือนว่ามีลิงก์บนการ์ด
            const hasLink = (project.projectLinks && project.projectLinks.length > 0) || project.projectLink;
            if (hasLink) {
                const badgeContainer = card.querySelector('.flex.items-center.space-x-3');
                if(badgeContainer) {
                    const linkIconHtml = `<div class="flex items-center text-blue-500 bg-blue-50 px-1.5 py-0.5 rounded shadow-sm border border-blue-100" title="มีลิงก์แนบ">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    </div>`;
                    badgeContainer.insertAdjacentHTML('afterbegin', linkIconHtml);
                }
            }

            const comments = project.detailsData?.logs?.filter(l => l.type === 'comment') || [];
            const commentBadge = card.querySelector('.card-comment-badge');
            if (comments.length > 0) {
                commentBadge.classList.remove('hidden');
                commentBadge.classList.add('flex');
                card.querySelector('.card-comment-count').textContent = comments.length;

                const lastCommentTime = new Date(comments[comments.length - 1].timestamp);
                const now = new Date();
                const diffHours = (now - lastCommentTime) / (1000 * 60 * 60);
                if (diffHours <= 24) {
                    card.querySelector('.card-comment-ping').classList.remove('hidden');
                }
            }

            const completeBtn = card.querySelector('.quick-complete-btn');
            const deleteBtn = card.querySelector('.delete-card-btn');
            const editBtn = card.querySelector('.quick-edit-btn');
            
            if(project.status === 'Completed') completeBtn.style.display = 'none';

            editBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                Components.showEditProjectPopup(project);
            });

            completeBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                UI.showLoading('กำลังปิดงาน...');
                try {
                    const response = await API.run('updateProjectStatus', project.projectId, 'Completed');
                    if(response.status === 'success') { UI.showSuccess('ปิดงานสำเร็จ!'); App.loadInitialData(); }
                    else { UI.showError(response.message); }
                } catch(err) { UI.showError(err.message); }
            });

            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                Components.showDeleteProjectPopup(project.projectId, project.projectName);
            });

            card.addEventListener('click', (e) => {
                if(!e.target.closest('.quick-complete-btn') && !e.target.closest('.delete-card-btn') && !e.target.closest('.quick-edit-btn')) {
                    App.openDetailView(project.projectId);
                }
            });

            return card;
        },

        renderGantt(project) {
            const container = document.getElementById('project-gantt-container');
            const checklist = project.detailsData?.checklist || [];
            
            if (checklist.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-sm text-center py-10 font-medium">โปรดเพิ่มงานย่อย (Checklist) ก่อน เพื่อดูไทม์ไลน์การทำงาน</p>';
                return;
            }

            const tasks = checklist.map((item, index) => {
                const start = item.startDate ? new Date(item.startDate).toISOString().split('T')[0] : new Date(project.rawTimestamp).toISOString().split('T')[0];
                let end = '';
                if (item.dueDate) {
                    end = new Date(item.dueDate).toISOString().split('T')[0];
                } else if (project.projectDueDate) {
                    end = new Date(project.projectDueDate).toISOString().split('T')[0];
                } else {
                    const d = new Date(project.rawTimestamp);
                    d.setDate(d.getDate() + 2);
                    end = d.toISOString().split('T')[0];
                }

                if (new Date(end) < new Date(start)) {
                    end = start;
                }

                let progress = 0;
                if (item.status === 'Completed' || item.status === 'Complete') progress = 100;
                else if (item.status === 'In Progress') progress = 50;

                return {
                    id: `subtask-${index}`,
                    name: item.text,
                    start: start,
                    end: end,
                    progress: progress,
                    custom_class: (item.status === 'Completed' || item.status === 'Complete') ? 'gantt-completed' : 'gantt-active'
                };
            });

            container.innerHTML = '<div id="inner-project-gantt"></div>';
            new Gantt("#inner-project-gantt", tasks, {
                view_mode: 'Day',
                language: 'en',
                bar_height: 25,
                padding: 15,
                on_date_change: async (task, start, end) => {
                    const subtaskIndex = parseInt(task.id.split('-')[1]);
                    const startDateStr = new Date(start.getTime() - (start.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                    const endDateStr = new Date(end.getTime() - (end.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                    
                    UI.showLoading('กำลังบันทึกวันที่...');
                    try {
                        const response = await API.run('updateSubtaskDates', project.projectId, subtaskIndex, startDateStr, endDateStr);
                        if (response.status === 'success') {
                            UI.showSuccess('บันทึกสำเร็จ');
                            App.refreshDetailView(); 
                        } else {
                            UI.showError(response.message);
                            DetailView.renderGantt(AppState.currentProject); 
                        }
                    } catch (err) {
                        UI.showError(err.message);
                        DetailView.renderGantt(AppState.currentProject); 
                    }
                }
            });
        },
        renderChecklist() {
            const container = document.getElementById('checklist-container');
            if (!container) return;
            const checklist = AppState.currentProject.detailsData?.checklist || [];
            container.innerHTML = checklist.length === 0 ? '<p class="text-gray-400 text-sm text-center py-4 bg-gray-50 rounded-xl border border-dashed border-gray-200">ยังไม่มีงานย่อย</p>' : '';
            checklist.forEach((item, index) => {
                const template = document.getElementById('checklist-item-template');
                const card = template.content.cloneNode(true).firstElementChild;
                card.dataset.index = index;
                card.querySelector('.item-text').textContent = item.text;
                const statusStyle = Config.STATUS_STYLES[item.status || 'New'] || Config.STATUS_STYLES["New"];
                
                const statusSpan = card.querySelector('.item-status');
                statusSpan.textContent = item.status || 'New';
                statusSpan.className = `item-status text-[10px] font-bold py-1 px-2.5 rounded-md uppercase tracking-wide ml-2 ${statusStyle.badge}`;
                
                card.querySelector('.item-assignee-image').src = item.assigneeImage || Config.DEFAULT_AVATAR;
                card.querySelector('.item-assignee-name').textContent = item.assignee || 'N/A';
                
                const dateEl = card.querySelector('.item-due-date');
                if(item.dueDate) {
                    dateEl.textContent = new Date(item.dueDate).toLocaleDateString('th-TH', { month:'short', day:'numeric'});
                } else {
                    dateEl.textContent = 'ไม่ระบุ';
                    dateEl.className = 'item-due-date flex items-center text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded-md';
                }

                container.appendChild(card);
            });
        },
        renderLogs() {
            const container = document.getElementById('log-container');
            if (!container) return;
            const logs = AppState.currentProject.detailsData?.logs || [];
            container.innerHTML = logs.length === 0 ? '<p class="text-gray-400 text-sm text-center py-10">ยังไม่มีประวัติการทำงาน</p>' : '';
            [...logs].reverse().forEach(log => {
                const template = document.getElementById('log-entry-template');
                const entry = template.content.cloneNode(true).firstElementChild;
                
                const dotEl = entry.querySelector('.log-dot');
                if (dotEl) dotEl.className = `log-dot absolute w-2.5 h-2.5 rounded-full -left-[6px] top-4 border-2 border-white shadow-sm ${UI.getUserColorClass(log.user)}`;

                entry.querySelector('.log-text').innerHTML = UI.linkify(log.display_text || log.text);
                entry.querySelector('.log-meta').textContent = `โดย ${log.user.split('@')[0]} - ${new Date(log.timestamp).toLocaleString('th-TH', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })}`;
                container.appendChild(entry);
            });
        },
        addEventListeners() {
            document.getElementById('back-to-kanban-btn')?.addEventListener('click', App.goBackToKanban);
            
            document.getElementById('expand-details-btn')?.addEventListener('click', () => {
                let popupLinksHtml = '';

                    width: '800px',

                    customClass: { confirmButton: 'bg-indigo-600' }
                });
            });
            
            document.getElementById('edit-initial-info-btn')?.addEventListener('click', Components.showEditInitialInfoPopup);
            
            document.getElementById('inline-edit-date-btn')?.addEventListener('click', () => {
                Components.showEditProjectPopup(AppState.currentProject);
            });

            document.getElementById('updateStatusBtn')?.addEventListener('click', async () => {
                const newStatus = document.getElementById('detail-status-select').value;
                if (newStatus === AppState.currentProject.status) return;
                UI.showLoading('กำลังอัปเดตสถานะ...');
                try {
                    const response = await API.run('updateProjectStatus', AppState.currentProject.projectId, newStatus);
                    if (response.status === 'success') App.refreshDetailView(); 
                    else UI.showError(response.message);
                } catch(err) { UI.showError(err.message); }
            });

            document.getElementById('add-checklist-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const input = document.getElementById('checklist-input');
                const assigneeSelect = document.getElementById('checklist-assignee-select');
                const dueDateInput = document.getElementById('checklist-duedate');
                const text = input.value.trim();
                
                if (!text) return;
                UI.showLoading('กำลังสร้างงานย่อย...');
                
                const selectedOption = assigneeSelect.options[assigneeSelect.selectedIndex];
                const newChecklistItem = { 
                    text, 
                    status: 'New', 
                    history: [], 
                    comments: [], 
                    assignee: selectedOption.value, 
                    assigneeImage: selectedOption.dataset.image, 
                    assigneeEmail: selectedOption.dataset.email, 
                    dueDate: dueDateInput.value 
                };
                
                const newDetailsData = AppState.currentProject.detailsData || { checklist: [], logs: [] };
                newDetailsData.checklist = newDetailsData.checklist || [];
                newDetailsData.checklist.push(newChecklistItem);
                
                try {
                    const response = await API.run('updateProjectDetails', AppState.currentProject.projectId, newDetailsData);
                    if (response.status === 'success') { UI.showSuccess('เพิ่มงานย่อยสำเร็จ'); App.refreshDetailView(); } 
                    else UI.showError(response.message);
                } catch (err) { UI.showError(err.message); }
            });

            document.getElementById('add-comment-btn')?.addEventListener('click', async () => {
                const input = document.getElementById('comment-input');
                const text = input.value.trim();
                if(!text) return;
                UI.showLoading('กำลังส่งข้อความ...');
                try {
                    const mentionedNames = (text.match(/@(\w+)/g) || []).map(name => name.substring(1));
                    const mentionedEmails = mentionedNames.map(name => {
                        const admin = AppState.admins.find(a => a.name === name);
                        return admin ? admin.email : null;
                    }).filter(Boolean);
                    
                    const response = await API.run('addLog', AppState.currentProject.projectId, { 
                        commentText: text, 
                        type: 'comment',
                        mentionedEmails: mentionedEmails
                    });
                    
                    if (response.status === 'success') {
                        App.refreshDetailView();
                    } else UI.showError(response.message);
                } catch (err) { UI.showError(err.message); }
            });

            UI.initializeMention(document.getElementById('comment-input'));

            // Whiteboard Modal Logic
            document.getElementById('open-whiteboard-btn')?.addEventListener('click', () => {
                if (typeof window.ExcalidrawLib === 'undefined' && typeof ExcalidrawLib === 'undefined') {
                    UI.showError('ไม่สามารถโหลดไลบรารีกระดานวาดภาพได้ กรุณารอสักครู่หรือรีเฟรชหน้าเว็บ');
                    return;
                }
                
                const modal = document.getElementById('whiteboard-modal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                const container = document.getElementById('excalidraw-container');
                
                let initialElements = [];
                const savedWhiteboard = AppState.currentProject.detailsData?.whiteboard;
                if (savedWhiteboard) {
                    if (AppState.currentProject.detailsData?.whiteboardCompressed) {
                        try {
                            const decompressed = LZString.decompressFromBase64(savedWhiteboard);
                            initialElements = JSON.parse(decompressed);
                        } catch (e) {
                            console.error("Decompression failed", e);
                            initialElements = [];
                        }
                    } else {
                        initialElements = savedWhiteboard;
                    }
                }
                
                window.tempWhiteboardElements = initialElements;
                
                if (!window.excalidrawRoot) {
                    window.excalidrawRoot = ReactDOM.createRoot(container);
                }
                
                window.excalidrawRoot.render(
                    React.createElement(window.ExcalidrawLib ? window.ExcalidrawLib.Excalidraw : ExcalidrawLib.Excalidraw, {
                        initialData: { elements: window.tempWhiteboardElements },
                        onChange: (elements) => {
                            window.tempWhiteboardElements = elements;
                        },
                        langCode: "th-TH"
                    })
                );
            });

            document.getElementById('close-whiteboard-btn')?.addEventListener('click', () => {
                document.getElementById('whiteboard-modal').classList.add('hidden');
                document.getElementById('whiteboard-modal').classList.remove('flex');
            });

            document.getElementById('save-whiteboard-btn')?.addEventListener('click', async () => {
                UI.showLoading('กำลังบันทึกกระดานวาดภาพ...');
                try {
                    const newDetailsData = AppState.currentProject.detailsData || { checklist: [], logs: [] };
                    
                    const jsonString = JSON.stringify(window.tempWhiteboardElements);
                    const compressedData = LZString.compressToBase64(jsonString);
                    
                    newDetailsData.whiteboard = compressedData;
                    newDetailsData.whiteboardCompressed = true;
                    
                    const fullString = JSON.stringify(newDetailsData);
                    if (fullString.length > 49000) {
                        throw new Error('ข้อมูลกระดานวาดภาพใหญ่เกินไป (Google Sheets รับได้สูงสุด 50,000 ตัวอักษร) กรุณาลบรูปภาพหรือเส้นที่ซับซ้อนออกบางส่วนครับ');

                        };
                        const createLinkHtml = (link) => {
                            if (!link || !link.url) return '';

                        };
                        
                        const createSystemLogHtml = (log) => {
                            const filesHtml = (log.files || []).map(createFileHtml).join('');

                    Swal.fire({

                                UI.initializeMention(document.getElementById('swal-checklist-comment'));
                                
                                const handleApiCall = async (button, action, params, isDynamicUpdate = false) => {

                                        const response = await API.run(action, ...params);

                                            if (isDynamicUpdate && response.data) {

                                                currentItem = response.data;
                                                DetailView.renderChecklist();
                                                const newHtml = generatePopupHtml(currentItem);
                                                const contentWrapper = Swal.getHtmlContainer();
                                                if(contentWrapper) {
                                                    contentWrapper.innerHTML = newHtml;
                                                    setupEventListeners(currentItem);
                                                    const chatContainer = document.getElementById('swal-conversation-container');
                                                    if(chatContainer) chatContainer.scrollTop = chatContainer.scrollHeight;

                                                Swal.close();
                                                App.refreshDetailView();

                                        } else {
                                            UI.showError(response.message);
                                            if(button && document.body.contains(button)) {
                                                button.disabled = false;
                                                button.innerHTML = originalContent;
                                            }
                                        }
                                    } catch (err) {
                                        UI.showError(err.message);

                                        }

                                document.getElementById('action-panel-toggle')?.addEventListener('click', (e) => {

                                    }

                                    const fileInput = document.getElementById('swal-comment-file');
                                    const text = input.value.trim();
                                    const file = fileInput.files[0];
                                    if (!text && !file) return UI.showError('กรุณาพิมพ์ข้อความหรือแนบไฟล์');
                                    
                                    const commentData = { 
                                        checklistIndex: index, 
                                        commentText: text || 'ส่งไฟล์แนบ',
                                        mentionedEmails: (text.match(/@([\w.]+)/g) || []).map(name => {
                                            const admin = AppState.admins.find(a => a.name === name.substring(1));
                                            return admin ? admin.email : null;
                                        }).filter(Boolean)
                                    };
                                    if (file) commentData.files = [await UI.readFileAsBase64(file)];
                                    handleApiCall(button, 'addCommentToChecklistItem', [AppState.currentProject.projectId, commentData], true);

                                    handleApiCall(e.target, 'updateChecklistItemStatus', [AppState.currentProject.projectId, { checklistIndex: index, newStatus, logText: `เปลี่ยนสถานะเป็น ${newStatus}` }], true);

                                    const logText = logInput.value.trim();
                                    const file = fileInput.files[0];
                                    const linkUrl = linkUrlInput.value.trim();
                                    const linkLabel = linkLabelInput.value.trim();

    const KanbanBoard = {

        init() {

            container.addEventListener('dragstart', this.handleDragStart.bind(this));
            container.addEventListener('dragover', this.handleDragOver.bind(this));
            container.addEventListener('dragleave', this.handleDragLeave.bind(this));
            container.addEventListener('drop', this.handleDrop.bind(this));
            container.addEventListener('dragend', this.handleDragEnd.bind(this));
            DOMElements.searchInput.addEventListener('input', this.applyFiltersAndSearch);
            DOMElements.userFilterSelect.addEventListener('change', this.applyFiltersAndSearch);
        },
        applyFiltersAndSearch() {
            const searchTerm = DOMElements.searchInput.value.toLowerCase();
            const selectedUser = DOMElements.userFilterSelect.value;
            let filteredProjects = AppState.projects;
            if (selectedUser !== 'all') filteredProjects = filteredProjects.filter(p => p.assignedTo === selectedUser);
            if (searchTerm) filteredProjects = filteredProjects.filter(p => p.projectName.toLowerCase().includes(searchTerm));
            KanbanBoard.render(filteredProjects);
            if(!DOMElements.ganttView.classList.contains('hidden')) GanttView.render();
            if(!DOMElements.calendarView.classList.contains('hidden')) CalendarView.render();
        },
        render(projectsToRender) {
            DOMElements.skeletonLoader.classList.add('hidden');
            DOMElements.kanbanContainer.innerHTML = '';
            const groupedProjects = projectsToRender.reduce((acc, p) => { (acc[p.status] = acc[p.status] || []).push(p); return acc; }, {});
            const statusesToRender = Config.STATUS_ORDER.filter(status => status !== 'Wait for Review' || (groupedProjects[status] && groupedProjects[status].length > 0));
            
            statusesToRender.forEach(status => {
                const projectsInStatus = groupedProjects[status] || [];
                const column = document.createElement('div');
                column.className = "flex-shrink-0 w-[340px] h-full pb-4";
                
                column.innerHTML = `
                    <div class="bg-gray-100/50 rounded-2xl h-full flex flex-col border border-gray-100" data-status="${status}">
                        <div class="flex justify-between items-center p-4">
                            <h2 class="text-sm font-bold text-gray-700 uppercase tracking-wider">${status}</h2>
                            <span class="text-xs font-bold bg-white text-gray-500 px-2.5 py-1 rounded-lg border border-gray-200 shadow-sm">${projectsInStatus.length}</span>
                        </div>
                        <div class="cards-container px-3 pb-3 space-y-3 overflow-y-auto flex-grow">
                            ${projectsInStatus.length === 0 ? '<div class="text-center p-6 border-2 border-dashed border-gray-200 rounded-xl m-2"><p class="text-gray-400 text-sm font-medium">ลากการ์ดมาวางที่นี่</p></div>' : ''}
                        </div>
                    </div>`;
                const cardsContainer = column.querySelector('.cards-container');
                projectsInStatus.sort((a,b) => new Date(b.rawTimestamp) - new Date(a.rawTimestamp)).forEach(p => cardsContainer.appendChild(Components.createProjectCard(p)));
                DOMElements.kanbanContainer.appendChild(column);
            });
        },
        async handleDrop(e) {
            e.preventDefault();
            const column = e.target.closest('[data-status]');
            if (column && this.draggedItem) {
                const projectId = e.dataTransfer.getData('text/plain'), oldStatus = e.dataTransfer.getData('text/x-old-status'), newStatus = column.dataset.status;
                column.classList.remove('drag-over');
                if (oldStatus !== newStatus) {
                    UI.showLoading('กำลังอัปเดตสถานะ...');
                    try {
                        const response = await API.run('updateProjectStatus', projectId, newStatus);
                        if (response.status === 'success') { UI.showSuccess('อัปเดตสำเร็จ'); await App.loadInitialData(); }
                        else { UI.showError(response.message); this.render(AppState.projects); }
                    } catch(err) { UI.showError(err.message); this.render(AppState.projects); }
                }
            }
        },
        handleDragStart(e) {
            const card = e.target.closest('[data-project-id][draggable="true"]');
            if (card) { this.draggedItem = card; e.dataTransfer.setData('text/plain', card.dataset.projectId); e.dataTransfer.setData('text/x-old-status', card.dataset.status); setTimeout(() => card.classList.add('opacity-50', 'scale-95'), 0); }
        },
        handleDragOver(e) { const column = e.target.closest('[data-status]'); if (column && this.draggedItem) { e.preventDefault(); column.classList.add('drag-over'); } },
        handleDragLeave(e) { const column = e.target.closest('[data-status]'); if (column) column.classList.remove('drag-over'); },
        handleDragEnd() { document.querySelectorAll('.opacity-50').forEach(el => el.classList.remove('opacity-50', 'scale-95')); document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); this.draggedItem = null; }
    };

    const CalendarView = {
        init() {},
        render() { 
            const container = DOMElements.calendarView;
            container.innerHTML = '<div class="flex items-center justify-center h-full text-gray-500 font-medium">ส่วนปฏิทิน (Calendar View) อยู่ระหว่างการพัฒนาครับ</div>';
        }
    };

    const App = {
        init() {
            PersonalTodo.init(); 
            
            DOMElements.addProjectBtn.addEventListener('click', () => Components.showAddProject());
            DOMElements.settingsBtn?.addEventListener('click', () => Components.showSettingsPopup());
            
            DOMElements.kanbanViewBtn.addEventListener('click', () => {
                UI.showView('kanban');
            });
            DOMElements.ganttViewBtn.addEventListener('click', () => {
                UI.showView('gantt');
                GanttView.render();
            });
            DOMElements.calendarViewBtn.addEventListener('click', () => {
                UI.showView('calendar');
                CalendarView.render();
            });

            KanbanBoard.init();
            CalendarView.init();
            this.loadInitialData(window.urlParams ? window.urlParams.projectId : null);
        },
        async loadInitialData(projectIdToOpen = null) {
            if (!Swal.isVisible()) UI.showLoading('กำลังโหลดข้อมูล...');
            try {
                const data = await API.run('getInitialData');
                AppState.projects = data.projects.status === 'success' ? data.projects.data : [];
                AppState.admins = data.admins.status === 'success' ? data.admins.data : [];
                
                const adminData = AppState.admins.find(a => a.email === data.currentUser.email);
                AppState.currentUser = { ...data.currentUser, imageUrl: adminData?.imageUrl || Config.DEFAULT_AVATAR };
                
                this.populateUserFilter();
                
                if (projectIdToOpen) {
                    this.openDetailView(projectIdToOpen);
                } else {
                    const currentView = !DOMElements.ganttView.classList.contains('hidden') ? 'gantt' : 'kanban';
                    UI.showView(currentView);
                    KanbanBoard.applyFiltersAndSearch(); 
                }
                Swal.close();
            } catch (error) { UI.showError(error.message); }
        },
        populateUserFilter() {
            DOMElements.userFilterSelect.innerHTML = '<option value="all">แสดงทั้งหมด</option>';
            AppState.admins.forEach(admin => {
                const option = document.createElement('option');
                option.value = admin.name; option.textContent = admin.name;
                DOMElements.userFilterSelect.appendChild(option);
            });
            DOMElements.searchFilterContainer.classList.remove('hidden');
        },
        async openDetailView(projectId) {
            UI.showView('detail');
            UI.showLoading('กำลังจัดเตรียมข้อมูล...');
            try {
                let project = AppState.projects.find(p => p.projectId === projectId);
                if (!project) {
                    const response = await API.run('getProjectById', projectId);
                    if (response.status !== 'success') throw new Error(response.message);
                    project = response.data;
                }
                DetailView.render(project);
                Swal.close();
            } catch(err) { UI.showError(err.message); this.goBackToKanban(); }
        },
        goBackToKanban() {
            UI.showView('kanban');
            KanbanBoard.applyFiltersAndSearch();
            window.history.pushState({}, document.title, window.location.pathname);
        },
        async refreshDetailView() { 
            if (!AppState.currentProject) return;
            try {
                const projectId = AppState.currentProject.projectId;
                const response = await API.run('getProjectById', projectId);
                if (response.status === 'success') {
                    const projectIndex = AppState.projects.findIndex(p => p.projectId === projectId);
                    if (projectIndex !== -1) AppState.projects[projectIndex] = response.data;
                    DetailView.render(response.data);
                    Swal.close();
                } else {
                    UI.showError(response.message);
                }
            } catch (err) {
                UI.showError(err.message);
            }
         }
    };

    // --- APP INITIALIZATION ---
    App.init();
});
</script>
